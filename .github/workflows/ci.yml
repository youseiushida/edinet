name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --group dev --extra analysis --extra display
      - run: uv run ruff check src tests

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --group dev --extra analysis --extra display
      - name: Unit tests
        run: uv run pytest --tb=short
        env:
          EDINET_TAXONOMY_ROOT: docs/仕様書/2026/タクソノミ

  test-taxonomy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --group dev --extra analysis --extra display
      - name: Taxonomy existence tests
        run: uv run pytest -m integration --tb=short
        env:
          EDINET_TAXONOMY_ROOT: docs/仕様書/2026/タクソノミ
